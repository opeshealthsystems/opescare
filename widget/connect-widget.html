<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpesCare Connect Widget Sandbox</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F8FAFC; color: #1E293B; max-width: 800px; margin: 40px auto; padding: 20px; }
        .widget-frame-container { border: 1px solid #E2E8F0; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header { margin-bottom: 24px; }
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpesCare Connect Widget Embedder</h1>
        <p>This sandbox simulates how a third-party Hospital EMR embeds the secure OpesCare consent and patient lookup widget inside their physician workspace.</p>
    </div>

    <!-- Connect Widget Embed Frame -->
    <div class="widget-frame-container">
        <!-- Short-lived Session token supplied by hospital backend after authenticating B2B -->
        <iframe src="https://widget.connect.opescare.com/v1/embed?session_token=wgt_session_test_active_01"></iframe>
    </div>

    <script>
        // Parent frame listens to widget cross-origin events securely
        window.addEventListener("message", function(event) {
            if (event.origin !== "https://widget.connect.opescare.com") return;
            
            console.log("OpesCare Widget Event Received:", event.data);
            if (event.data.event === "consent.granted") {
                alert("Patient granted consent! Grant ID: " + event.data.consent_grant_id);
            }
        }, false);
    </script>
</body>
</html>
