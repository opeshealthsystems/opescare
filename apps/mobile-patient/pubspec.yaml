name: opescare_patient
description: OpesCare Patient Mobile App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  equatable: ^2.0.5
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  # Firebase
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

dependency_overrides:
  # Patched local copy: fixes Flutter 3.44+ final-class incompatibility in lucide_icons 0.257.0
  lucide_icons:
    path: packages/lucide_icons

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
