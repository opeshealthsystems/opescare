<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F4C81"/>
      <stop offset="100%" stop-color="#0F2744"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Shield outline -->
  <path d="M32 8 L48 14 L48 30 C48 40 32 56 32 56 C32 56 16 40 16 30 L16 14 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ECG/heartbeat pulse inside shield -->
  <polyline points="19,32 23,32 26,24 29,40 32,28 35,36 37,32 45,32"
            fill="none" stroke="#14B8A6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Teal accent dot at QRS peak -->
  <circle cx="32" cy="28" r="2.5" fill="#14B8A6"/>
</svg>
