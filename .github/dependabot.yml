version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/apps/api-laravel"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Douala"
    open-pull-requests-limit: 5
    reviewers:
      - "makkowens24"
    labels:
      - "dependencies"
      - "security"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Douala"
    open-pull-requests-limit: 5
    reviewers:
      - "makkowens24"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
