version: 2
updates:
  # PHP / Composer dependencies
  - package-ecosystem: "composer"
    directory: "/apps/api-laravel"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Libreville"
    open-pull-requests-limit: 10
    reviewers:
      - "makkowens24"
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignore major version bumps on Laravel core — handle manually
      - dependency-name: "laravel/framework"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Libreville"
    open-pull-requests-limit: 5
    reviewers:
      - "makkowens24"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # NPM (if applicable)
  - package-ecosystem: "npm"
    directory: "/apps/api-laravel"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Libreville"
    open-pull-requests-limit: 10
    reviewers:
      - "makkowens24"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
