name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: '0 7 * * 1'

jobs:
  composer-audit:
    name: Composer Vulnerability Audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        working-directory: apps/api-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run composer audit
        working-directory: apps/api-laravel
        run: composer audit --format=json --no-interaction 2>&1 | tee /tmp/composer-audit.json
        continue-on-error: false

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit-report
          path: /tmp/composer-audit.json
          retention-days: 30

  npm-audit:
    name: NPM Vulnerability Audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for package.json
        id: check_npm
        working-directory: apps/api-laravel
        run: |
          if [ -f package.json ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.check_npm.outputs.has_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: NPM install
        if: steps.check_npm.outputs.has_npm == 'true'
        working-directory: apps/api-laravel
        run: npm ci --ignore-scripts

      - name: NPM audit
        if: steps.check_npm.outputs.has_npm == 'true'
        working-directory: apps/api-laravel
        run: npm audit --audit-level=high

  laravel-tests:
    name: Laravel Test Suite
    runs-on: ubuntu-24.04
    needs: [composer-audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pdo_sqlite, redis
          tools: composer:v2

      - name: Copy env
        working-directory: apps/api-laravel
        run: cp .env.example .env.testing

      - name: Install dependencies
        working-directory: apps/api-laravel
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate key
        working-directory: apps/api-laravel
        run: php artisan key:generate --env=testing

      - name: Run tests
        working-directory: apps/api-laravel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test --no-coverage --parallel
